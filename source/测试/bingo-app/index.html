<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>社会指数宾果游戏</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:#f5f7fa; color:#2c3e50; min-height:100vh;
}
.container { max-width:600px; margin:0 auto; padding:16px 12px 40px; }

/* 标题区 */
.header {
  display:flex; margin-bottom:16px; background:#fff;
  border-radius:14px; box-shadow:0 2px 12px rgba(0,0,0,.06); overflow:hidden;
}
.header-title {
  flex:3; display:flex; align-items:center; justify-content:center;
  padding:16px; font-size:1.3em; font-weight:700; text-align:center;
}
.header-desc {
  flex:2; display:flex; align-items:center; justify-content:center;
  padding:12px; font-size:0.78em; color:#7f8c9b; line-height:1.6;
  border-left:1px solid #e8ecf1; text-align:center;
}

/* 棋盘 */
.board {
  display:grid; grid-template-columns:repeat(5,1fr); gap:6px;
  background:#fff; border-radius:14px; padding:10px; box-shadow:0 2px 12px rgba(0,0,0,.06);
}
.cell {
  aspect-ratio:1; display:flex; align-items:center; justify-content:center;
  text-align:center; font-size:0.72em; line-height:1.35; padding:6px 4px;
  border:2px solid #e8ecf1; border-radius:10px; cursor:pointer;
  transition:all .2s; user-select:none; word-break:break-word; overflow:hidden;
}
.cell:hover { border-color:#49b1f5; }
.cell.marked { background:#49b1f5; color:#fff; border-color:#49b1f5; }
.cell.bingo-line {
  background:#e74c3c; color:#fff; border-color:#e74c3c;
  animation:pulse .6s ease-in-out infinite alternate;
}
@keyframes pulse { from{transform:scale(1)} to{transform:scale(1.04)} }

/* 状态 */
.status {
  text-align:center; margin:14px 0; padding:12px;
  background:#fff; border-radius:14px; box-shadow:0 2px 12px rgba(0,0,0,.06);
  font-size:0.9em; min-height:44px; display:flex; align-items:center; justify-content:center;
}

/* 按钮组 */
.btn-group { display:flex; gap:8px; justify-content:center; margin-top:12px; }
.btn {
  padding:8px 20px; border:none; border-radius:999px; cursor:pointer; font-size:0.85em; transition:all .2s;
}
.btn-primary { background:#49b1f5; color:#fff; }
.btn-primary:hover { background:#3498db; }
.btn-secondary { background:#fff; border:1px solid #ddd; color:#555; }
.btn-secondary:hover { border-color:#49b1f5; color:#49b1f5; }
.btn-share { background:#1da1f2; color:#fff; }
.btn-share:hover { background:#1a91da; }

/* 分享弹窗 */
.modal-overlay {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,.5); z-index:999; align-items:center; justify-content:center;
  padding:20px;
}
.modal-overlay.active { display:flex; }
.modal-box {
  background:#fff; border-radius:16px; padding:24px; max-width:460px; width:100%;
  text-align:center; box-shadow:0 8px 32px rgba(0,0,0,.15);
}
.modal-box img { width:100%; border-radius:8px; margin:12px 0; }
.modal-box h3 { margin-bottom:8px; }
.modal-box .modal-btns { display:flex; gap:8px; justify-content:center; margin-top:12px; }

@media (max-width:480px) {
  .header { flex-direction:column; }
  .header-desc { border-left:none; border-top:1px solid #e8ecf1; }
  .cell { font-size:0.65em; padding:4px 2px; }
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-title">社会指数宾果游戏</div>
    <div class="header-desc">如果有其中一条线连起来，<br>你就不仅不社会，<br>还是完犊子的死宅社恐了</div>
  </div>

  <div class="board" id="board"></div>

  <div class="status" id="status">点击格子标记，连成线即 Bingo！</div>

  <div class="btn-group">
    <button class="btn btn-secondary" id="resetBtn">🔄 重新开局</button>
    <button class="btn btn-share" id="shareBtn">📤 分享结果</button>
  </div>

</div>

<!-- 分享弹窗 -->
<div class="modal-overlay" id="shareModal">
  <div class="modal-box">
    <h3>📤 分享你的宾果</h3>
    <div id="shareImageArea"></div>
    <p id="shareText" style="font-size:0.85em;color:#7f8c9b;"></p>
    <div class="modal-btns">
      <button class="btn btn-secondary" id="closeModalBtn">关闭</button>
      <a id="downloadBtn" class="btn btn-primary" download="bingo.png">💾 保存图片</a>
    </div>
  </div>
</div>

<script>
(function(){
  var CELLS = [
    "不玩王者·吃鸡手游","不喜欢轰趴·KTV等娱乐场所","不玩抖音西瓜火山微信视频号等短视频","休息日很少出门","天天玩QQ",
    "不玩微信朋友圈","没纹身过","没去过酒吧","不嚼槟榔","没追过星",
    "异性朋友没有超过2个","没染过发","没去过按摩·大保健·洗脚等其中一个","一次也没赌博过","不喜欢追电视剧·综艺",
    "觉得自己一个人出去吃饭完全没啥","没谈过恋爱","不抽烟","不喝酒","不自拍",
    "很少运动","不喜欢聚会·团建","喜欢ACG","不会花时间化妆·打扮","疫情期间宅在家不会觉得无聊"
  ];

  var marked = {};
  var bingo = false;

  function render() {
    var html = '';
    for (var i = 0; i < 25; i++) {
      var cls = 'cell';
      if (marked[i]) cls += ' marked';
      if (bingo && isBingoCell(i)) cls += ' bingo-line';
      html += '<div class="' + cls + '" data-i="' + i + '">' + CELLS[i] + '</div>';
    }
    document.getElementById('board').innerHTML = html;

    document.querySelectorAll('.cell').forEach(function(el){
      el.addEventListener('click', function(){
        var i = parseInt(this.dataset.i);
        marked[i] = !marked[i];
        checkBingo();
        render();
      });
    });

    updateStatus();
  }

  function updateStatus() {
    var count = 0;
    for (var k in marked) { if (marked[k]) count++; }
    var el = document.getElementById('status');
    if (bingo) {
      el.innerHTML = '🎉 <strong>BINGO！</strong> 连成一条线了！你是不折不扣的死宅社恐 🤣';
    } else {
      el.innerHTML = '已标记 <strong>' + count + '</strong> 项 — 点击格子标记，连成线即 Bingo！';
    }
  }

  function checkBingo() {
    bingo = false;
    for (var r = 0; r < 5; r++) {
      var win = true; for (var c = 0; c < 5; c++) { if (!marked[r*5+c]) { win = false; break; } }
      if (win) { bingo = true; return; }
    }
    for (var c = 0; c < 5; c++) {
      var win = true; for (var r = 0; r < 5; r++) { if (!marked[r*5+c]) { win = false; break; } }
      if (win) { bingo = true; return; }
    }
    var win = true; for (var i = 0; i < 5; i++) { if (!marked[i*5+i]) { win = false; break; } }
    if (win) { bingo = true; return; }
    win = true; for (var i = 0; i < 5; i++) { if (!marked[i*5+(4-i)]) { win = false; break; } }
    if (win) { bingo = true; return; }
  }

  function isBingoCell(idx) {
    if (!bingo) return false;
    var r = Math.floor(idx/5), c = idx%5;
    var rw = true; for (var cc=0;cc<5;cc++) { if (!marked[r*5+cc]) { rw=false; break; } } if (rw) return true;
    var cw = true; for (var rr=0;rr<5;rr++) { if (!marked[rr*5+c]) { cw=false; break; } } if (cw) return true;
    if (r===c) { var dw=true; for(var i=0;i<5;i++){if(!marked[i*5+i]){dw=false;break;}} if(dw) return true; }
    if (r+c===4) { var dw=true; for(var i=0;i<5;i++){if(!marked[i*5+(4-i)]){dw=false;break;}} if(dw) return true; }
    return false;
  }

  // 生成分享图片
  function generateShareImage() {
    var size = 800;
    var cellSize = 130;
    var padding = 50;
    var headerH = 100;
    var gap = 6;
    var boardSize = cellSize * 5 + gap * 4;
    var totalW = size;
    var totalH = padding + headerH + 20 + boardSize + padding;

    var canvas = document.createElement('canvas');
    canvas.width = totalW;
    canvas.height = totalH;
    var ctx = canvas.getContext('2d');

    // 背景
    ctx.fillStyle = '#f5f7fa';
    ctx.fillRect(0, 0, totalW, totalH);

    // 标题
    ctx.fillStyle = '#2c3e50';
    ctx.font = 'bold 28px -apple-system,PingFang SC,Microsoft YaHei,sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText('社会指数宾果游戏', totalW/2, padding);

    // 副标题
    ctx.fillStyle = '#7f8c9b';
    ctx.font = '16px -apple-system,PingFang SC,Microsoft YaHei,sans-serif';
    ctx.fillText('如果有其中一条线连起来，你就不仅不社会，还是完犊子的死宅社恐了', totalW/2, padding + 40);

    // 棋盘背景
    var bx = (totalW - boardSize) / 2;
    var by = padding + headerH;
    ctx.fillStyle = '#fff';
    roundRect(ctx, bx - 10, by - 10, boardSize + 20, boardSize + 20, 14);
    ctx.fill();

    // BINGO 标记行
    var bingoLabels = ['B','I','N','G','O'];
    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 22px -apple-system,sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (var i = 0; i < 5; i++) {
      ctx.fillText(bingoLabels[i], bx + cellSize/2 + i*(cellSize+gap), by - 2);
    }

    // 格子
    for (var i = 0; i < 25; i++) {
      var row = Math.floor(i / 5);
      var col = i % 5;
      var x = bx + col * (cellSize + gap);
      var y = by + 22 + row * (cellSize + gap);

      var isMarked = marked[i];
      var isWin = bingo && isBingoCell(i);

      // 格子背景
      ctx.fillStyle = isWin ? '#e74c3c' : (isMarked ? '#49b1f5' : '#fff');
      roundRect(ctx, x, y, cellSize, cellSize, 8);
      ctx.fill();

      // 边框
      ctx.strokeStyle = isWin || isMarked ? 'transparent' : '#e8ecf1';
      ctx.lineWidth = 2;
      roundRect(ctx, x, y, cellSize, cellSize, 8);
      ctx.stroke();

      // 文字
      ctx.fillStyle = isWin || isMarked ? '#fff' : '#2c3e50';
      ctx.font = '13px -apple-system,PingFang SC,Microsoft YaHei,sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      var text = CELLS[i];
      // 自动换行
      var maxW = cellSize - 16;
      var lines = [];
      var current = '';
      for (var c = 0; c < text.length; c++) {
        var test = current + text[c];
        if (ctx.measureText(test).width > maxW && current.length > 0) {
          lines.push(current);
          current = text[c];
        } else {
          current = test;
        }
      }
      if (current) lines.push(current);
      var lineH = 18;
      var startY = y + cellSize/2 - (lines.length-1) * lineH/2;
      for (var l = 0; l < lines.length; l++) {
        ctx.fillText(lines[l], x + cellSize/2, startY + l * lineH);
      }
    }

    // 页脚
    ctx.fillStyle = '#aaa';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('1nuo.me', totalW/2, totalH - 16);

    return canvas.toDataURL('image/png');
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // 分享功能
  document.getElementById('shareBtn').addEventListener('click', function(){
    var dataUrl = generateShareImage();
    var count = 0;
    for (var k in marked) { if (marked[k]) count++; }
    document.getElementById('shareImageArea').innerHTML = '<img src="' + dataUrl + '" alt="宾果结果">';
    document.getElementById('shareText').textContent = '已标记 ' + count + '/25 项';
    document.getElementById('downloadBtn').href = dataUrl;
    document.getElementById('shareModal').classList.add('active');
  });

  document.getElementById('closeModalBtn').addEventListener('click', function(){
    document.getElementById('shareModal').classList.remove('active');
  });
  document.getElementById('shareModal').addEventListener('click', function(e){
    if (e.target === this) this.classList.remove('active');
  });

  document.getElementById('resetBtn').addEventListener('click', function(){
    marked = {}; bingo = false; render();
  });

  render();
})();
</script>
</body>
</html>
