<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>塔罗牌占卜</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Noto+Serif+SC:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"DM Sans","Noto Serif SC",serif;background:#f8f6f2;color:#1c1917;min-height:100vh}
.container{max-width:560px;margin:0 auto;padding:24px 16px 40px;text-align:center}
.header h1{font-family:"Noto Serif SC",serif;font-size:1.4em;margin-bottom:4px}
.header p{color:#a8a29e;font-size:.85em;margin-bottom:24px}
.draw-area{cursor:pointer;margin:24px 0;position:relative;min-height:260px}
.deck{width:180px;height:260px;margin:0 auto;position:relative;background:linear-gradient(135deg,#5A82B8,#4a6d99);border-radius:12px;box-shadow:0 4px 24px rgba(0,0,0,.12);transition:transform .3s cubic-bezier(0.16,1,0.3,1);display:flex;align-items:center;justify-content:center;color:#ffffff88;font-size:3em;}
.deck:hover{transform:scale(1.03);box-shadow:0 8px 32px rgba(0,0,0,.16)}
.card-display{display:none;animation:cardIn .4s cubic-bezier(0.16,1,0.3,1)}
.card-display.show{display:block}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card-img{width:200px;height:290px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1);margin:0 auto 16px;display:block;object-fit:cover}
.result{background:#fff;border:1px solid #e7e5e4;border-radius:16px;padding:24px;margin-top:16px;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.result-reverse{font-size:.8em;color:#a8a29e;margin-bottom:4px}
.result-name{font-family:"Noto Serif SC",serif;font-size:1.3em;font-weight:700;margin-bottom:4px}
.result-arcana{font-size:.8em;color:#a8a29e;margin-bottom:8px}
.result-keywords{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
.keyword{padding:2px 10px;background:#f5f5f4;border-radius:999px;font-size:.75em;color:#78716c}
.result-meaning{font-size:.9em;color:#57534e;line-height:1.6;text-align:left;padding:12px;background:#fafaf9;border-radius:8px}
.spread-select{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.spread-btn{padding:6px 16px;border:1px solid #e7e5e4;border-radius:999px;background:#fff;cursor:pointer;font-size:.8em;transition:all .2s}
.spread-btn.active{background:#1c1917;color:#fff;border-color:#1c1917}
.spread-btn:hover{border-color:#5A82B8;color:#5A82B8}
.btn{padding:12px 32px;border:none;border-radius:999px;background:#1c1917;color:#fff;font-size:.9em;font-weight:500;cursor:pointer;transition:all .2s cubic-bezier(0.16,1,0.3,1);margin-top:16px}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.1)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.positions{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin:20px 0}
.position-card{width:140px;text-align:center}
.position-img{width:100px;height:145px;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.08);margin:0 auto 8px;display:object-fit:cover;cursor:pointer;transition:transform .2s}
.position-label{font-size:.75em;color:#a8a29e;margin-bottom:4px}
.position-name{font-size:.85em;font-weight:600}
.shuffling .deck{animation:shuffle .3s cubic-bezier(0.16,1,0.3,1) 6}
@keyframes shuffle{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-4deg)}75%{transform:rotate(4deg)}}
.footer{font-size:.7em;color:#d6d3d1;margin-top:16px}
</style>
</head>
<body>
<div class="container" id="app">
  <div class="header">
    <h1>🔮 塔罗牌占卜</h1>
    <p>点击牌堆抽取你的塔罗牌</p>
  </div>
  <div class="spread-select" id="spreadSelect"></div>
  <div class="draw-area" id="drawArea">
    <div class="deck" id="deck">🃏</div>
  </div>
  <div id="singleResult" class="card-display"></div>
  <div id="multiResult" class="card-display"></div>
  <button class="btn" id="drawBtn">🔮 抽牌</button>
  <div class="footer">Rider-Waite Tarot</div>
</div>

<script src="cards.json"></script>
<script>
(function(){
  var app = document.getElementById('app');
  var deck = document.getElementById('deck');
  var drawBtn = document.getElementById('drawBtn');
  var singleResult = document.getElementById('singleResult');
  var multiResult = document.getElementById('multiResult');
  var spreadSelect = document.getElementById('spreadSelect');

  var cardList = (typeof CARDS !== 'undefined' && CARDS.cards) ? CARDS.cards : [];
  var currentSpread = 'single';

  var spreads = [
    {id:'single',label:'单张'},
    {id:'three',label:'三张'},
    {id:'five',label:'五张'}
  ];

  spreads.forEach(function(s){
    var b = document.createElement('button');
    b.className = 'spread-btn' + (s.id==='single'?' active':'');
    b.textContent = s.label;
    b.addEventListener('click',function(){
      spreadSelect.querySelectorAll('.spread-btn').forEach(function(x){x.classList.remove('active')});
      this.classList.add('active');
      currentSpread = s.id;
      clearResult();
    });
    spreadSelect.appendChild(b);
  });

  function shuffle(a){var arr=a.slice();for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;}return arr;}

  function getMeanings(card, rev){
    if(!card||!card.meanings) return ['探索未知'];
    var m = card.meanings.old || card.meanings.new || card.meanings;
    var arr = rev ? (m.reversed || m.upright) : (m.upright || m.reversed);
    return arr || ['探索未知'];
  }

  function clearResult(){
    singleResult.className = 'card-display';
    singleResult.innerHTML = '';
    multiResult.className = 'card-display';
    multiResult.innerHTML = '';
  }

  function showSingle(card){
    var rev = Math.random() < 0.3;
    var m = getMeanings(card, rev).slice(0,4);
    singleResult.className = 'card-display show';
    singleResult.innerHTML =
      '<img class="card-img" src="cards/' + card.img + '" alt="' + card.name + '">' +
      '<div class="result">' +
      (rev ? '<div class="result-reverse">⚡ 逆位</div>' : '') +
      '<div class="result-name">' + card.name + '</div>' +
      '<div class="result-arcana">' + (card.arcana||'') + ' · ' + (card.suit||'') + '</div>' +
      '<div class="result-keywords">' +
      (card.keywords||[]).slice(0,4).map(function(k){return '<span class="keyword">'+k+'</span>'}).join('') + '</div>' +
      '<div class="result-meaning">' + m.map(function(x){return '✦ '+x}).join('<br>') + '</div></div>';
  }

  function showMulti(arr){
    multiResult.className = 'card-display show';
    var labels = ['过去','现在','未来','辅助','阻碍'];
    var h = '<div class="positions">';
    arr.forEach(function(c,i){
      var r = Math.random()<0.3;
      h += '<div class="position-card"><img class="position-img" src="cards/'+c.img+'" alt="'+c.name+'">' +
        '<div class="position-label">'+(labels[i]||'')+'</div>' +
        '<div class="position-name">'+c.name+(r?'(逆)':'')+'</div></div>';
    });
    h += '</div><div class="result">';
    arr.forEach(function(c,i){
      var r = Math.random()<0.3;
      var z = getMeanings(c,r).slice(0,2);
      h += '<div style="margin-bottom:8px">';
      h += '<strong>'+(labels[i]||'')+'：</strong> '+c.name+(r?'（逆位）':'')+'<br>';
      h += '<span style="font-size:.85em;color:#57534e">'+z.join(' · ')+'</span></div>';
    });
    h += '</div>';
    multiResult.innerHTML = h;
  }

  function draw(){
    app.classList.add('shuffling');
    drawBtn.disabled = true;
    clearResult();
    setTimeout(function(){
      var n = currentSpread==='single'?1:(currentSpread==='three'?3:5);
      var picked = shuffle(cardList).slice(0,n);
      app.classList.remove('shuffling');
      if(n===1){showSingle(picked[0]);}else{showMulti(picked);}
      drawBtn.disabled = false;
      drawBtn.textContent = '🔮 再抽一次';
    },600);
  }

  drawBtn.addEventListener('click', draw);
  deck.addEventListener('click', draw);
})();
</script>
</body>
</html>
