layout: false
---

<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 · 1nuo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- System fonts only -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #ffffff;
      color: #111;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    main {
      text-align: center;
      animation: in 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes in {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .code {
      font-family: "Instrument Serif", serif;
      font-size: clamp(5rem, 14vw, 10rem);
      line-height: 1;
      letter-spacing: -0.06em;
      color: #333;
      margin-bottom: 8px;
    }
    .tag {
      font-size: 0.75rem;
      color: #888;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 500;
      color: #111;
      margin-bottom: 12px;
    }
    p {
      font-size: 0.9375rem;
      line-height: 1.7;
      color: #666;
      margin-bottom: 56px;
    }

    /* Three-button row */
    .row {
      display: flex;
      justify-content: center;
      gap: 48px;
      max-width: 480px;
      margin: 0 auto;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 36px;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      border: 1.5px solid #e0e0e0;
      color: #333;
      background: #fff;
      flex: 1;
      white-space: nowrap;
    }
    .btn:hover {
      background: #f5f5f5;
      border-color: #bbb;
      transform: translateY(-1px);
    }
    .btn-primary {
      background: #111;
      color: #fff;
      border-color: #111;
    }
    .btn-primary:hover {
      background: #333;
      border-color: #333;
    }
    .btn:focus-visible {
      outline: 2px solid #111;
      outline-offset: 3px;
    }

    .foot {
      margin-top: 64px;
      font-size: 0.8125rem;
      color: #bbb;
    }

    @media (max-width: 640px) {
      .row { flex-direction: column; align-items: center; gap: 12px; max-width: 280px; }
      .btn { width: 100%; }
    @media (prefers-reduced-motion: reduce) {
      main, .btn { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <div class="tag">page not found</div>
    <h1>你找的东西不在这儿</h1>
    <p>链接可能写错了，页面可能搬家了，<br>也可能它从来就没存在过。</p>
    <div class="row">
      <a href="/" class="btn">← 回首页</a>
      <a href="/archives/" class="btn btn-primary">翻归档</a>
      <a href="https://github.com/1nuoiscute/1nuo-blog/issues/new" class="btn">告诉我 →</a>
    </div>
    <div class="foot">🧩 0x198</div>
  </main>
</body>
</html>
