<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>幸运签</title>
<style>
/* === 设计规范：Geist 字体族，8px 间距体系 === */
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Noto+Serif+SC:wght@400;600;700&display=swap');

:root {
  --bg: #f8f6f2;
  --card: #ffffff;
  --text: #1c1917;
  --muted: #a8a29e;
  --line: #e7e5e4;
  --accent: #b45309;
  --accent-soft: #fef3c7;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
  --radius: 16px;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

*{box-sizing:border-box;margin:0;padding:0}

body {
  font-family: "DM Sans", "Noto Serif SC", -apple-system, serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.container {
  max-width: 440px;
  width: 100%;
  padding: 24px;
  text-align: center;
}

/* === 签筒 === */
.jar-wrap {
  position: relative;
  width: 128px;
  height: 176px;
  margin: 0 auto 32px;
  cursor: pointer;
  transition: transform .2s var(--ease);
}
.jar-wrap:hover { transform: scale(1.04) }

.jar-body {
  width: 100%;
  height: 140px;
  background: linear-gradient(180deg, #a8a29e, #78716c);
  border-radius: 0 0 64px 64px / 0 0 32px 32px;
  position: relative;
  box-shadow: inset 0 -2px 8px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.1);
}
.jar-rim {
  width: 84%;
  height: 12px;
  background: #d6d3d1;
  border-radius: 6px;
  position: absolute;
  top: -6px;
  left: 8%;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}

/* 签枝 */
.stick {
  position: absolute;
  bottom: 110px;
  width: 5px;
  background: linear-gradient(180deg, #fef3c7, #fde68a);
  border-radius: 3px;
  transform-origin: bottom center;
}
.stick:nth-child(1) { left: 38%; height: 42px; animation: sway 2.4s var(--ease) infinite; }
.stick:nth-child(2) { left: 48%; height: 36px; animation: sway 2.4s var(--ease) infinite .3s; }
.stick:nth-child(3) { left: 58%; height: 48px; animation: sway 2.4s var(--ease) infinite .6s; }

@keyframes sway {
  0%, 100% { transform: rotate(-1deg); }
  50% { transform: rotate(2deg); }
}

/* 摇签动画 */
.shaking .jar-wrap { animation: jarShake .45s var(--ease) 4; }
@keyframes jarShake {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(-6deg); }
  75% { transform: rotate(6deg); }
}

/* === 结果卡片 === */
.result-card {
  display: none;
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 32px 24px 24px;
  margin-top: 16px;
  box-shadow: var(--shadow);
}
.result-card.show {
  display: block;
  animation: cardIn .4s var(--ease);
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.result-level {
  display: inline-block;
  padding: 4px 20px;
  border-radius: 999px;
  font-size: .8em;
  font-weight: 600;
  letter-spacing: .04em;
  margin-bottom: 16px;
}

.level-大吉 { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #fff; }
.level-吉 { background: linear-gradient(135deg, #34d399, #10b981); color: #fff; }
.level-中吉 { background: linear-gradient(135deg, #60a5fa, #3b82f6); color: #fff; }
.level-小吉 { background: linear-gradient(135deg, #a8a29e, #78716c); color: #fff; }
.level-凶 { background: linear-gradient(135deg, #f87171, #ef4444); color: #fff; }

.result-text {
  font-size: 1.5em;
  font-weight: 700;
  font-family: "Noto Serif SC", serif;
  margin-bottom: 12px;
  color: var(--text);
}

.result-poem {
  font-size: .95em;
  color: var(--muted);
  line-height: 1.7;
  font-style: italic;
  font-family: "Noto Serif SC", serif;
  margin-bottom: 8px;
}

.result-desc {
  font-size: .85em;
  color: #78716c;
  line-height: 1.6;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--line);
}

/* === 按钮 === */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 32px;
  margin-top: 24px;
  border: none;
  border-radius: 999px;
  background: var(--text);
  color: #fff;
  font-size: .95em;
  font-weight: 500;
  cursor: pointer;
  transition: all .2s var(--ease);
  box-shadow: 0 2px 8px rgba(0,0,0,.08);
}
.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(0,0,0,.12);
}
.btn:active { transform: scale(.97); }
.btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

/* 总数 */
.footer-note {
  margin-top: 16px;
  font-size: .75em;
  color: #d6d3d1;
}
</style>
</head>
<body>
<div class="container" id="app">

  <div class="jar-wrap" id="jar" onclick="draw()">
    <div class="jar-rim"></div>
    <div class="jar-body">
      <div class="stick"></div>
      <div class="stick"></div>
      <div class="stick"></div>
    </div>
  </div>

  <div class="result-card" id="result">
    <div class="result-level" id="level"></div>
    <div class="result-text" id="text"></div>
    <div class="result-poem" id="poem"></div>
    <div class="result-desc" id="desc"></div>
  </div>

  <button class="btn" id="drawBtn" onclick="draw()">
    <span>🎋</span> 摇一签
  </button>

  <div class="footer-note" id="remainText"></div>
</div>

<script>
var FORTUNES = [
  { level:"大吉", text:"上上签", poem:"春风得意马蹄疾，一日看尽长安花", desc:"万事顺遂，心想事成。今日诸事皆宜，放手去做吧。" },
  { level:"大吉", text:"天官赐福", poem:"山重水复疑无路，柳暗花明又一村", desc:"之前困扰你的事情即将迎来转机，坚持下去。" },
  { level:"大吉", text:"紫气东来", poem:"大鹏一日同风起，扶摇直上九万里", desc:"运势如虹，正是大展宏图之时，不可错过良机。" },
  { level:"大吉", text:"龙凤呈祥", poem:"在天愿作比翼鸟，在地愿为连理枝", desc:"人际关系和感情运势极佳，适合表达心意。" },
  { level:"吉", text:"上签", poem:"海内存知己，天涯若比邻", desc:"虽有远虑，但朋友会是你最大的助力。" },
  { level:"吉", text:"中平", poem:"乘风破浪会有时，直挂云帆济沧海", desc:"眼下或许有些波折，但前途是光明的。" },
  { level:"吉", text:"小顺", poem:"花开堪折直须折，莫待无花空折枝", desc:"机会就在眼前，主动一点，不要错过。" },
  { level:"吉", text:"如意的", poem:"但愿人长久，千里共婵娟", desc:"平淡是真，知足常乐，今日宜静不宜动。" },
  { level:"吉", text:"安宁", poem:"采菊东篱下，悠然见南山", desc:"适合独处和思考，把时间留给自己。" },
  { level:"中吉", text:"半吉", poem:"不识庐山真面目，只缘身在此山中", desc:"当局者迷，不妨换个角度看待问题。" },
  { level:"中吉", text:"待时", poem:"长风破浪会有时", desc:"现在不是最好的时机，再等等，耐心是美德。" },
  { level:"中吉", text:"守成", poem:"千淘万漉虽辛苦，吹尽狂沙始到金", desc:"坚持你正在做的事，付出会有回报。" },
  { level:"中吉", text:"渐佳", poem:"好雨知时节，当春乃发生", desc:"一切都在往好的方向发展，虽然慢但稳。" },
  { level:"小吉", text:"微吉", poem:"此情可待成追忆，只是当时已惘然", desc:"有些事情过去了就让它过去，别回头。" },
  { level:"小吉", text:"平淡", poem:"人间有味是清欢", desc:"平平淡淡才是真，今天适合安安静静过。" },
  { level:"小吉", text:"慎行", poem:"欲穷千里目，更上一层楼", desc:"想要看到更远的风景，需要先提升自己。" },
  { level:"小吉", text:"量力", poem:"知之为知之，不知为不知", desc:"诚实地面对自己的局限，量力而行。" },
  { level:"凶", text:"末吉", poem:"人生如逆旅，我亦是行人", desc:"诸事不宜，宜静不宜动，小心行事。" },
  { level:"凶", text:"下签", poem:"举杯消愁愁更愁", desc:"不宜冲动做决定，建议等运势好转再行动。" },
  { level:"凶", text:"避让", poem:"昨夜西风凋碧树", desc:"今日可能有小的波折或意外，保持警惕。" },
  { level:"凶", text:"蛰伏", poem:"雄关漫道真如铁，而今迈步从头越", desc:"暂时的低谷是为了更好的起飞，蓄力等待。" },
  { level:"凶", text:"警示", poem:"纸上得来终觉浅，绝知此事要躬行", desc:"不要轻信他人的建议，亲身实践才是真理。" },
  { level:"中吉", text:"机遇", poem:"忽如一夜春风来，千树万树梨花开", desc:"意想不到的好事可能突然降临，保持期待。" },
  { level:"吉", text:"明朗", poem:"晴空一鹤排云上，便引诗情到碧霄", desc:"心情和运势都在放晴，今天是好日子。" },
  { level:"凶", text:"低潮", poem:"自在飞花轻似梦，无边丝雨细如愁", desc:"情绪可能有些低落，给自己一点时间恢复。" },
  { level:"大吉", text:"圆满", poem:"但愿长圆如此夜，人情未必看承别", desc:"所有的事情都在往圆满的方向发展。" },
  { level:"大吉", text:"鼎盛", poem:"会当凌绝顶，一览众山小", desc:"运势处于顶峰期，适合挑战高难度目标。" },
  { level:"吉", text:"喜乐", poem:"春风十里不如你", desc:"今天会遇到让你开心的人或事，面带微笑。" },
  { level:"中吉", text:"转机", poem:"沉舟侧畔千帆过，病树前头万木春", desc:"旧的结束意味着新的开始，别怕变化。" },
  { level:"小吉", text:"随缘", poem:"相逢一醉是前缘", desc:"有些事情强求不来，随缘就好。" }
];

var usedIndices = [];

function draw(){
  var app = document.getElementById('app');
  var btn = document.getElementById('drawBtn');
  app.classList.add('shaking');
  btn.disabled = true;

  setTimeout(function(){
    var available = [];
    for(var i=0;i<FORTUNES.length;i++){
      if(!usedIndices.includes(i)) available.push(i);
    }
    if(available.length === 0) usedIndices = [];
    if(available.length === 0) for(var i=0;i<FORTUNES.length;i++) available.push(i);
    var idx = available[Math.floor(Math.random() * available.length)];
    usedIndices.push(idx);
    var f = FORTUNES[idx];

    document.getElementById('level').textContent = f.level;
    document.getElementById('level').className = 'result-level level-' + f.level;
    document.getElementById('text').textContent = f.text;
    document.getElementById('poem').textContent = f.poem;
    document.getElementById('desc').textContent = f.desc;

    var card = document.getElementById('result');
    card.classList.remove('show');
    void card.offsetWidth;
    card.classList.add('show');

    app.classList.remove('shaking');
    btn.disabled = false;
    btn.innerHTML = '<span>🎋</span> 再摇一签';

    var remain = FORTUNES.length - usedIndices.length;
    document.getElementById('remainText').textContent = '剩余 ' + remain + ' 签';
  }, 800);  // 300-500ms 页面过渡规范
}
</script>
</body>
</html>
