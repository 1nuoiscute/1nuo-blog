<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>2048</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,system-ui,sans-serif;background:transparent;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;margin:0}
.container{width:100%;max-width:400px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px}
.title{font-size:24px;font-weight:700;color:#1c1917;letter-spacing:-.02em}
.scores{display:flex;gap:6px}
.score-box{background:#1c1917;color:#fff;border-radius:8px;padding:4px 12px;text-align:center;min-width:60px}
.score-box .label{font-size:10px;text-transform:uppercase;opacity:.6;letter-spacing:.05em}
.score-box .value{font-size:16px;font-weight:700;line-height:1.2}
.controls{display:flex;gap:6px;margin-bottom:12px}
.btn{height:36px;padding:0 16px;border:1px solid #e7e5e4;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#1c1917;transition:all .15s ease;-webkit-tap-highlight-color:transparent;user-select:none}
.btn:hover{border-color:#5A82B8;background:#dce8f5}
.btn-primary{background:#1c1917;color:#fff;border-color:#1c1917}
.btn-primary:hover{opacity:.85;background:#1c1917;border-color:#1c1917}
.game-container{position:relative;width:100%;aspect-ratio:1;background:#bbada0;border-radius:12px;padding:8px;touch-action:none;overflow:hidden}
.grid-bg{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:8px;width:100%;height:100%;position:absolute;inset:0;padding:8px;pointer-events:none}
.grid-bg .cell{background:rgba(238,228,218,.35);border-radius:6px}
.tile-layer{position:absolute;inset:0;padding:8px;pointer-events:none}
.tile{position:absolute;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:32px;z-index:2;will-change:transform;transition:transform .1s ease}
.tile-2{background:#eee4da;color:#776e65}
.tile-4{background:#ede0c8;color:#776e65}
.tile-8{background:#f2b179;color:#f9f6f2}
.tile-16{background:#f59563;color:#f9f6f2}
.tile-32{background:#f67c5f;color:#f9f6f2}
.tile-64{background:#f65e3b;color:#f9f6f2}
.tile-128{background:#edcf72;color:#f9f6f2;font-size:28px}
.tile-256{background:#edcc61;color:#f9f6f2;font-size:28px}
.tile-512{background:#edc850;color:#f9f6f2;font-size:28px}
.tile-1024{background:#edc53f;color:#f9f6f2;font-size:22px}
.tile-2048{background:#edc22e;color:#f9f6f2;font-size:22px}
.tile-super{background:#3c3a32;color:#f9f6f2;font-size:22px}

@keyframes tile-pop{0%{transform:var(--tpos) scale(1)}50%{transform:var(--tpos) scale(1.2)}100%{transform:var(--tpos) scale(1)}}
.tile-pop{animation:tile-pop .2s ease}
@keyframes tile-appear{0%{transform:var(--tpos) scale(0);opacity:0}50%{transform:var(--tpos) scale(1.1)}100%{transform:var(--tpos) scale(1);opacity:1}}
.tile-appear{animation:tile-appear .18s ease-out}

.game-over-overlay{position:absolute;inset:0;background:rgba(238,228,218,.73);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;opacity:0;pointer-events:none;transition:opacity .3s ease}
.game-over-overlay.show{opacity:1;pointer-events:auto}
.game-over-overlay h2{font-size:36px;font-weight:700;color:#776e65;margin-bottom:8px}
.game-over-overlay p{font-size:14px;color:#776e65;margin-bottom:16px}
.hint{text-align:center;margin-top:10px;font-size:13px;color:#a8a29e}
@media(max-width:420px){.tile{font-size:24px}.tile-128,.tile-256,.tile-512{font-size:20px}.tile-1024,.tile-2048,.tile-super{font-size:16px}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">2048</div>
    <div class="scores">
      <div class="score-box"><div class="label">分数</div><div class="value" id="score">0</div></div>
      <div class="score-box"><div class="label">最高</div><div class="value" id="best">0</div></div>
    </div>
  </div>
  <div class="controls">
    <button class="btn btn-primary" onclick="game.restart()">↻ 新一局</button>
    <button class="btn" onclick="game.undo()">↩ 撤销</button>
  </div>
  <div class="game-container" id="game-container">
    <div class="grid-bg" id="grid-bg"></div>
    <div class="tile-layer" id="tile-layer"></div>
    <div class="game-over-overlay" id="game-over">
      <h2 id="result-title">游戏结束</h2>
      <p id="result-msg">再试一次吧</p>
      <button class="btn btn-primary" onclick="game.restart()">再来一局</button>
    </div>
  </div>
  <div class="hint">← ↑ → ↓ 方向键 / 滑动操作</div>
</div>
<script>
class Game2048{
  constructor(){
    this.size=4;this.tileId=0;this.tiles=[];this.score=0;this.best=0;this.won=false;this.over=false;this.undoStack=[];
    this.loadBest();this.init();this.render();
    document.addEventListener('keydown',e=>{
      if(this.over)return;
      const map={ArrowLeft:0,ArrowUp:1,ArrowRight:2,ArrowDown:3};
      if(e.key in map){e.preventDefault();this.move(map[e.key])}
    });
    let sx,sy;const c=document.getElementById('game-container');
    c.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
    c.addEventListener('touchend',e=>{
      if(!sx||!sy)return;
      const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy,ax=Math.abs(dx),ay=Math.abs(dy);
      if(Math.max(ax,ay)<30)return;
      this.move(ax>ay?(dx>0?2:0):(dy>0?3:1));
      sx=sy=null;
    },{passive:true});
  }
  init(){
    this.tileId=0;this.score=0;this.won=false;this.over=false;this.undoStack=[];
    this.tiles=Array.from({length:this.size},()=>Array(this.size).fill(null));
    this.addRandom();this.addRandom();
  }
  loadBest(){try{this.best=parseInt(localStorage.getItem('game2048_best'))||0}catch(e){}}
  saveBest(){if(this.score>this.best){this.best=this.score;try{localStorage.setItem('game2048_best',this.best.toString())}catch(e){}}}
  addRandom(){
    const empty=[];for(let r=0;r<this.size;r++)for(let c=0;c<this.size;c++)if(!this.tiles[r][c])empty.push({r,c});
    if(!empty.length)return;
    const {r,c}=empty[Math.floor(Math.random()*empty.length)];
    this.tiles[r][c]={value:Math.random()<.9?2:4,id:++this.tileId,isNew:true};
  }
  cloneGrid(){return this.tiles.map(row=>row.map(t=>t?{...t}:null));}
  move(dir){
    if(this.over)return;
    this.undoStack.push({tiles:this.cloneGrid(),score:this.score,won:this.won});
    const n=this.size;
    let moved=false;const merged=new Set();
    // iterate in order depending on direction
    const rowOrder=[],colOrder=[];
    for(let i=0;i<n;i++){rowOrder.push(i);colOrder.push(i);}
    if(dir===1||dir===3)rowOrder.reverse();
    if(dir===2||dir===3)colOrder.reverse();

    for(const ri of rowOrder)for(const ci of colOrder){
      const cell=this.tiles[ri][ci];
      if(!cell)continue;
      // find farthest position
      let dr=ri,dc=ci;
      while(true){
        let nr=dr,nc=dc;
        if(dir===0)nc--;else if(dir===1)nr--;else if(dir===2)nc++;else nr++;
        if(nr<0||nr>=n||nc<0||nc>=n)break;
        const t=this.tiles[nr][nc];
        if(!t){dr=nr;dc=nc;continue;}
        if(t.value===cell.value&&!merged.has(t.id)&&!merged.has(cell.id)){
          // merge
          cell.value*=2;this.score+=cell.value;
          this.tiles[nr][nc]=cell;this.tiles[ri][ci]=null;
          cell.fromR=ri;cell.fromC=ci;cell.toR=nr;cell.toC=nc;
          merged.add(cell.id);cell.isMerge=true;
          dr=nr;dc=nc;moved=true;break;
        }break;
      }
      if(dr!==ri||dc!==ci){
        this.tiles[dr][dc]=cell;this.tiles[ri][ci]=null;
        cell.fromR=ri;cell.fromC=ci;cell.toR=dr;cell.toC=dc;
        moved=true;
      }
    }
    if(moved){this.addRandom();this.render();this.checkState();}
  }
  checkState(){
    if(this.tiles.some(row=>row.some(t=>t&&t.value===2048))){this.won=true;this.saveBest();this.showOver('🎉 你赢了！','继续挑战更高分数吧');return;}
    for(let r=0;r<this.size;r++)for(let c=0;c<this.size;c++){
      if(!this.tiles[r][c])return;
      if(c+1<this.size&&this.tiles[r][c+1]&&this.tiles[r][c].value===this.tiles[r][c+1].value)return;
      if(r+1<this.size&&this.tiles[r+1][c]&&this.tiles[r][c].value===this.tiles[r+1][c].value)return;
    }
    this.over=true;this.saveBest();this.showOver('😵 游戏结束',`得分：${this.score}`);
  }
  showOver(t,m){document.getElementById('result-title').textContent=t;document.getElementById('result-msg').textContent=m;document.getElementById('game-over').classList.add('show');}
  undo(){
    if(!this.undoStack.length)return;
    const s=this.undoStack.pop();this.tiles=s.tiles;this.score=s.score;this.won=s.won;this.over=false;
    document.getElementById('game-over').classList.remove('show');this.render();
  }
  restart(){this.init();this.render();document.getElementById('game-over').classList.remove('show');}
  tilePos(r,c){
    const gap=8,pad=8;
    const totalGap=gap*3,avail=gameSize-totalGap-pad*2;
    return{left:pad+c*(avail/4+gap),top:pad+r*(avail/4+gap),size:avail/4};
  }
  render(){
    const layer=document.getElementById('tile-layer');
    const rect=document.getElementById('game-container').getBoundingClientRect();
    gameSize=Math.min(rect.width,rect.height);
    const gap=8,pad=8;
    const totalGap=gap*3,avail=gameSize-totalGap-pad*2,tSize=avail/4;
    layer.innerHTML='';
    const animTiles=[];
    for(let r=0;r<this.size;r++)for(let c=0;c<this.size;c++){
      const t=this.tiles[r][c];
      if(!t)continue;
      const el=document.createElement('div');
      let cls='tile';
      if(t.value<=2048)cls+=' tile-'+t.value;else cls+=' tile-super';
      el.className=cls;el.textContent=t.value;
      el.style.width=tSize+'px';el.style.height=tSize+'px';
      el.style.borderRadius='6px';
      if(t.fromR!==undefined){
        // Animate: start at old position
        const fp=this.tilePos(t.fromR,t.fromC);
        el.style.left=fp.left+'px';el.style.top=fp.top+'px';
        layer.appendChild(el);
        // After layout, transition to new position
        const tp=this.tilePos(t.toR,t.toC);
        requestAnimationFrame(()=>{
          el.style.transition='transform .1s ease';
          el.style.transform=`translate(${tp.left-fp.left}px,${tp.top-fp.top}px)`;
        });
        if(t.isMerge){
          setTimeout(()=>{
            const pp=this.tilePos(t.toR,t.toC);
            el.style.transition='none';
            el.style.left=pp.left+'px';el.style.top=pp.top+'px';
            el.style.transform='';
            // pop animation
            el.style.animation='tile-pop .2s ease';
          },115);
        }
        delete t.fromR;delete t.fromC;delete t.toR;delete t.toC;delete t.isMerge;
      }else{
        const pp=this.tilePos(r,c);
        el.style.left=pp.left+'px';el.style.top=pp.top+'px';
        layer.appendChild(el);
        if(t.isNew){el.style.animation='tile-appear .18s ease-out';t.isNew=false;}
      }
    }
    document.getElementById('score').textContent=this.score;
    document.getElementById('best').textContent=this.best;
  }
}
let gameSize=0;
const game=new Game2048();
</script>
</body>
</html>
