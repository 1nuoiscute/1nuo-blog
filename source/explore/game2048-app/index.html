<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>2048</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,system-ui,sans-serif;background:transparent;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;margin:0}
.container{width:100%;max-width:400px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px}
.title{font-size:24px;font-weight:700;color:#1c1917;letter-spacing:-.02em}
.scores{display:flex;gap:6px}
.score-box{background:#1c1917;color:#fff;border-radius:8px;padding:4px 12px;text-align:center;min-width:60px}
.score-box .label{font-size:10px;text-transform:uppercase;opacity:.6;letter-spacing:.05em}
.score-box .value{font-size:16px;font-weight:700;line-height:1.2}
.controls{display:flex;gap:6px;margin-bottom:12px}
.btn{height:36px;padding:0 16px;border:1px solid #e7e5e4;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#1c1917;transition:all .15s ease;-webkit-tap-highlight-color:transparent;user-select:none}
.btn:hover{border-color:#5A82B8;background:#dce8f5}
.btn-primary{background:#1c1917;color:#fff;border-color:#1c1917}
.btn-primary:hover{opacity:.85;background:#1c1917;border-color:#1c1917}
.game-container{position:relative;width:100%;aspect-ratio:1;background:#bbada0;border-radius:12px;padding:8px;touch-action:none;overflow:hidden}
.grid-layer{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:8px;width:100%;height:100%;position:absolute;inset:0;padding:8px}
.grid-cell{background:rgba(238,228,218,.35);border-radius:6px;position:relative}
.tile-cell{position:relative;display:flex;align-items:center;justify-content:center}
.tile{width:100%;height:100%;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:32px}
.tile-2{background:#eee4da;color:#776e65}
.tile-4{background:#ede0c8;color:#776e65}
.tile-8{background:#f2b179;color:#f9f6f2}
.tile-16{background:#f59563;color:#f9f6f2}
.tile-32{background:#f67c5f;color:#f9f6f2}
.tile-64{background:#f65e3b;color:#f9f6f2}
.tile-128{background:#edcf72;color:#f9f6f2;font-size:28px}
.tile-256{background:#edcc61;color:#f9f6f2;font-size:28px}
.tile-512{background:#edc850;color:#f9f6f2;font-size:28px}
.tile-1024{background:#edc53f;color:#f9f6f2;font-size:22px}
.tile-2048{background:#edc22e;color:#f9f6f2;font-size:22px}
.tile-super{background:#3c3a32;color:#f9f6f2;font-size:22px}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.tile-pop{z-index:3;animation:pop .2s ease}
@keyframes appear{0%{transform:scale(0);opacity:0}50%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
.tile-new{animation:appear .18s ease-out}
.game-over-overlay{position:absolute;inset:0;background:rgba(238,228,218,.73);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;opacity:0;pointer-events:none;transition:opacity .3s ease}
.game-over-overlay.show{opacity:1;pointer-events:auto}
.game-over-overlay h2{font-size:36px;font-weight:700;color:#776e65;margin-bottom:8px}
.game-over-overlay p{font-size:14px;color:#776e65;margin-bottom:16px}
.hint{text-align:center;margin-top:10px;font-size:13px;color:#a8a29e}
@media(max-width:420px){.tile{font-size:24px}.tile-128,.tile-256,.tile-512{font-size:20px}.tile-1024,.tile-2048,.tile-super{font-size:16px}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">2048</div>
    <div class="scores">
      <div class="score-box"><div class="label">分数</div><div class="value" id="score">0</div></div>
      <div class="score-box"><div class="label">最高</div><div class="value" id="best">0</div></div>
    </div>
  </div>
  <div class="controls">
    <button class="btn btn-primary" onclick="g.restart()">↻ 新一局</button>
    <button class="btn" onclick="g.undo()">↩ 撤销</button>
  </div>
  <div class="game-container" id="gc">
    <div class="grid-layer" id="gl"></div>
    <div class="game-over-overlay" id="go">
      <h2 id="rt">游戏结束</h2>
      <p id="rm">再试一次吧</p>
      <button class="btn btn-primary" onclick="g.restart()">再来一局</button>
    </div>
  </div>
  <div class="hint">← ↑ → ↓ 方向键 / 滑动操作</div>
</div>
<script>
const S=4;
class G{
  constructor(){
    this.n=1;this.g=[];this.s=0;this.b=0;this.w=false;this.o=false;this.u=[];
    try{this.b=parseInt(localStorage.getItem('gb'))||0}catch(e){}
    this.init();this.r();
    document.addEventListener('keydown',e=>{
      if(this.o)return;
      const m={ArrowLeft:0,ArrowUp:1,ArrowRight:2,ArrowDown:3};
      if(e.key in m){e.preventDefault();this.m(m[e.key])}
    });
    let sx,sy;const c=document.getElementById('gc');
    c.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
    c.addEventListener('touchend',e=>{
      if(!sx||!sy)return;
      const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy,ax=Math.abs(dx),ay=Math.abs(dy);
      if(Math.max(ax,ay)<30)return;
      this.m(ax>ay?(dx>0?2:0):(dy>0?3:1));
      sx=sy=null;
    },{passive:true});
  }
  init(){
    this.n=1;this.s=0;this.w=false;this.o=false;this.u=[];
    this.g=Array.from({length:S},()=>Array(S).fill(0));
    this.a();this.a();
  }
  a(){
    const e=[];for(let r=0;r<S;r++)for(let c=0;c<S;c++)if(!this.g[r][c])e.push({r,c});
    if(!e.length)return;
    const {r,c}=e[Math.floor(Math.random()*e.length)];
    this.g[r][c]={i:this.n++,v:Math.random()<.9?2:4,n:true};
  }
  slide(line){
    const tiles=line.filter(t=>t!==0);
    const out=[];const merged=new Set();let gained=0;
    for(let i=0;i<tiles.length;i++){
      if(i+1<tiles.length&&tiles[i].v===tiles[i+1].v){
        const nv=tiles[i].v*2;
        out.push({i:this.n++,v:nv,m:[tiles[i].i,tiles[i+1].i]});
        merged.add(tiles[i].i);merged.add(tiles[i+1].i);
        gained+=nv;i++;
      }else{out.push(tiles[i]);}
    }
    while(out.length<S)out.push(0);
    return {out,merged,gained};
  }
  m(dir){
    if(this.o)return;
    this.u.push({g:this.g.map(r=>r.map(t=>t?{...t}:0)),s:this.s,w:this.w});
    let moved=false;let totalGained=0;
    const rev=(a)=>[...a].reverse();
    for(let i=0;i<S;i++){
      let line;
      if(dir===0||dir===2){line=this.g[i];if(dir===2)line=rev(line);}
      else{line=this.g.map(r=>r[i]);if(dir===3)line=rev(line);}
      const {out,gained}=this.slide(line);
      let result=out;
      if(dir===2||dir===3)result=rev(result);
      let changed=false;
      for(let j=0;j<S;j++){
        const ov=line[j]?line[j].v:0;
        const nv=result[j]?result[j].v:0;
        if(ov!==nv){changed=true;break;}
        if(line[j]&&result[j]&&line[j].i!==result[j].i){changed=true;break;}
      }
      if(changed){
        moved=true;
        if(dir===0||dir===2)this.g[i]=result;
        else for(let r=0;r<S;r++)this.g[r][i]=result[r];
        totalGained+=gained;
      }
    }
    if(!moved){this.u.pop();return;}
    this.s+=totalGained;
    this.a();this.r();this.c();
  }
  c(){
    if(this.g.some(r=>r.some(t=>t&&t.v===2048))){this.w=true;this.save();this.over('🎉 你赢了！','继续挑战更高分数吧');return;}
    for(let r=0;r<S;r++)for(let c=0;c<S;c++){
      if(!this.g[r][c])return;
      if(c+1<S&&this.g[r][c+1]&&this.g[r][c].v===this.g[r][c+1].v)return;
      if(r+1<S&&this.g[r+1][c]&&this.g[r][c].v===this.g[r+1][c].v)return;
    }
    this.o=true;this.save();this.over('😵 游戏结束','得分：'+this.s);
  }
  over(t,m){document.getElementById('rt').textContent=t;document.getElementById('rm').textContent=m;document.getElementById('go').classList.add('show');}
  save(){if(this.s>this.b){this.b=this.s;try{localStorage.setItem('gb',this.b.toString())}catch(e){}}}
  undo(){
    if(!this.u.length)return;
    const s=this.u.pop();this.g=s.g;this.s=s.s;this.w=s.w;this.o=false;
    document.getElementById('go').classList.remove('show');this.r();
  }
  restart(){this.init();this.r();document.getElementById('go').classList.remove('show');}
  r(){
    const gl=document.getElementById('gl');
    // Build grid cells
    gl.innerHTML='';
    for(let r=0;r<S;r++)for(let c=0;c<S;c++){
      const cell=document.createElement('div');cell.className='grid-cell';
      const t=this.g[r][c];
      if(t){
        const tile=document.createElement('div');
        let cls='tile';
        if(t.v<=2048)cls+=' tile-'+t.v;else cls+=' tile-super';
        tile.className=cls;tile.textContent=t.v;
        cell.appendChild(tile);
        if(t.n){tile.classList.add('tile-new');t.n=false;}
        if(t.m){setTimeout(()=>{tile.classList.add('tile-pop');},50);delete t.m;}
      }
      gl.appendChild(cell);
    }
    document.getElementById('score').textContent=this.s;
    document.getElementById('best').textContent=this.b;
  }
}
let g;
function start(){g=new G();}
if(document.readyState==='complete'||document.readyState==='interactive'){start()}else{document.addEventListener('DOMContentLoaded',start)}
window.addEventListener('resize',function(){if(g&&!g.o){g.r()}});
</script>
</body>
</html>
