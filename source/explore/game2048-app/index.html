<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>2048</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',-apple-system,system-ui,sans-serif;background:transparent;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px;margin:0}
.container{width:100%;max-width:400px}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px}
.title{font-size:24px;font-weight:700;color:#1c1917;letter-spacing:-.02em}
.scores{display:flex;gap:6px}
.score-box{background:#1c1917;color:#fff;border-radius:8px;padding:4px 12px;text-align:center;min-width:60px}
.score-box .label{font-size:10px;text-transform:uppercase;opacity:.6;letter-spacing:.05em}
.score-box .value{font-size:16px;font-weight:700;line-height:1.2}
.controls{display:flex;gap:6px;margin-bottom:12px}
.btn{height:36px;padding:0 16px;border:1px solid #e7e5e4;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#1c1917;transition:all .15s ease}
.btn:hover{border-color:#5A82B8;background:#dce8f5}
.btn-primary{background:#1c1917;color:#fff;border-color:#1c1917}
.btn-primary:hover{opacity:.85;background:#1c1917;border-color:#1c1917}
.game-container{position:relative;width:100%;aspect-ratio:1;background:#bbada0;border-radius:12px;padding:8px;touch-action:none}
.grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:8px;width:100%;height:100%}
.cell{background:rgba(238,228,218,.35);border-radius:6px;position:relative}
.tile{position:absolute;top:0;left:0;width:calc(25% - 6px);height:calc(25% - 6px);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all .1s ease;z-index:1;font-size:32px}
.tile-2{background:#eee4da;color:#776e65}
.tile-4{background:#ede0c8;color:#776e65}
.tile-8{background:#f2b179;color:#f9f6f2}
.tile-16{background:#f59563;color:#f9f6f2}
.tile-32{background:#f67c5f;color:#f9f6f2}
.tile-64{background:#f65e3b;color:#f9f6f2}
.tile-128{background:#edcf72;color:#f9f6f2;font-size:28px}
.tile-256{background:#edcc61;color:#f9f6f2;font-size:28px}
.tile-512{background:#edc850;color:#f9f6f2;font-size:28px}
.tile-1024{background:#edc53f;color:#f9f6f2;font-size:22px}
.tile-2048{background:#edc22e;color:#f9f6f2;font-size:22px}
.tile-super{background:#3c3a32;color:#f9f6f2;font-size:22px}

.game-over-overlay{position:absolute;inset:0;background:rgba(238,228,218,.73);border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;opacity:0;pointer-events:none;transition:opacity .3s ease}
.game-over-overlay.show{opacity:1;pointer-events:auto}
.game-over-overlay h2{font-size:36px;font-weight:700;color:#776e65;margin-bottom:8px}
.game-over-overlay p{font-size:14px;color:#776e65;margin-bottom:16px}
.hint{text-align:center;margin-top:10px;font-size:13px;color:#a8a29e}
@media(max-width:420px){.tile{font-size:24px}.tile-128,.tile-256,.tile-512{font-size:20px}.tile-1024,.tile-2048,.tile-super{font-size:16px}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">2048</div>
    <div class="scores">
      <div class="score-box"><div class="label">分数</div><div class="value" id="score">0</div></div>
      <div class="score-box"><div class="label">最高</div><div class="value" id="best">0</div></div>
    </div>
  </div>
  <div class="controls">
    <button class="btn btn-primary" onclick="game.restart()">↻ 新一局</button>
    <button class="btn" onclick="game.undo()">↩ 撤销</button>
  </div>
  <div class="game-container" id="game-container">
    <div class="grid" id="grid"></div>
    <div class="game-over-overlay" id="game-over">
      <h2 id="result-title">游戏结束</h2>
      <p id="result-msg">再试一次吧</p>
      <button class="btn btn-primary" onclick="game.restart()">再来一局</button>
    </div>
  </div>
  <div class="hint">← ↑ → ↓ 方向键 / 滑动操作</div>
</div>
<script>
class Game2048{
  constructor(){
    this.size=4;this.tiles=[];this.score=0;this.best=0;this.won=false;this.over=false;this.undoStack=[];
    this.loadBest();this.init();this.render();
    document.addEventListener('keydown',e=>{
      if(this.over||this.won)return;
      const map={ArrowLeft:0,ArrowUp:1,ArrowRight:2,ArrowDown:3};
      if(e.key in map){e.preventDefault();this.move(map[e.key])}
    });
    let startX,startY;const container=document.getElementById('game-container');
    container.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;startY=e.touches[0].clientY;},{passive:true});
    container.addEventListener('touchend',e=>{
      if(!startX||!startY)return;
      const dx=e.changedTouches[0].clientX-startX,dy=e.changedTouches[0].clientY-startY,absDx=Math.abs(dx),absDy=Math.abs(dy);
      if(Math.max(absDx,absDy)<30)return;
      if(absDx>absDy){this.move(dx>0?2:0)}else{this.move(dy>0?3:1)}
      startX=startY=null;
    },{passive:true});
  }
  init(){
    this.tiles=Array(this.size).fill().map(()=>Array(this.size).fill(0));
    this.score=0;this.won=false;this.over=false;this.undoStack=[];
    this.addRandom();this.addRandom();
  }
  loadBest(){try{const v=localStorage.getItem('game2048_best');this.best=v?parseInt(v):0;}catch(e){this.best=0}}
  saveBest(){if(this.score>this.best){this.best=this.score;try{localStorage.setItem('game2048_best',this.best.toString());}catch(e){}}}
  addRandom(){
    const empty=[];
    for(let r=0;r<this.size;r++)for(let c=0;c<this.size;c++)if(!this.tiles[r][c])empty.push({r,c});
    if(!empty.length)return;
    const {r,c}=empty[Math.floor(Math.random()*empty.length)];
    this.tiles[r][c]=Math.random()<.9?2:4;
  }
  cloneGrid(){return this.tiles.map(row=>[...row]);}
  move(direction){
    if(this.over)return;
    this.undoStack.push({tiles:this.cloneGrid(),score:this.score,won:this.won});
    const moved=this.slide(direction);
    if(moved){this.addRandom();this.render();this.checkState();}
  }
  slide(dir){
    let moved=false;
    const rotate=(g)=>{const n=this.size,r=Array(n).fill().map(()=>Array(n).fill(0));for(let i=0;i<n;i++)for(let j=0;j<n;j++)r[j][n-1-i]=g[i][j];return r;};
    let g=this.tiles.map(r=>[...r]);
    for(let i=0;i<dir;i++)g=rotate(g);
    for(let r=0;r<this.size;r++){
      let row=g[r].filter(v=>v!==0),newRow=[];
      for(let i=0;i<row.length;i++){
        if(i+1<row.length&&row[i]===row[i+1]){newRow.push(row[i]*2);this.score+=row[i]*2;i++;}else{newRow.push(row[i]);}
      }
      while(newRow.length<this.size)newRow.push(0);
      if(newRow.some((v,i)=>v!==g[r][i]))moved=true;
      g[r]=newRow;
    }
    for(let i=0;i<(4-dir)%4;i++)g=rotate(g);
    if(moved)this.tiles=g;
    return moved;
  }
  checkState(){
    if(this.tiles.some(row=>row.includes(2048))){this.won=true;this.saveBest();this.showOver('🎉 你赢了！','继续挑战更高分数吧',true);return;}
    for(let r=0;r<this.size;r++)for(let c=0;c<this.size;c++){
      if(!this.tiles[r][c])return;
      if(c+1<this.size&&this.tiles[r][c]===this.tiles[r][c+1])return;
      if(r+1<this.size&&this.tiles[r][c]===this.tiles[r+1][c])return;
    }
    this.over=true;this.saveBest();this.showOver('😵 游戏结束',`得分：${this.score}`,false);
  }
  showOver(title,msg,isWin){
    document.getElementById('result-title').textContent=title;
    document.getElementById('result-msg').textContent=msg;
    document.getElementById('game-over').classList.add('show');
  }
  undo(){
    if(!this.undoStack.length)return;
    const s=this.undoStack.pop();this.tiles=s.tiles;this.score=s.score;this.won=s.won;this.over=false;
    document.getElementById('game-over').classList.remove('show');this.render();
  }
  restart(){
    this.init();this.render();document.getElementById('game-over').classList.remove('show');
  }
  render(){
    const grid=document.getElementById('grid');
    grid.innerHTML='';
    for(let r=0;r<this.size;r++)for(let c=0;c<this.size;c++){
      const cell=document.createElement('div');cell.className='cell';grid.appendChild(cell);
      const v=this.tiles[r][c];
      if(v){
        const tile=document.createElement('div');
        let cls='tile';
        if(v<=2048)cls+=' tile-'+v;else cls+=' tile-super';
        tile.className=cls;
        tile.textContent=v;
        tile.style.transform=`translate(${c*100+8}%,${r*100+8}%)`;
        tile.style.width='calc(25% - 6px)';tile.style.height='calc(25% - 6px)';
        grid.appendChild(tile);
      }
    }
    document.getElementById('score').textContent=this.score;
    document.getElementById('best').textContent=this.best;
  }
}
const game=new Game2048();
</script>
</body>
</html>
