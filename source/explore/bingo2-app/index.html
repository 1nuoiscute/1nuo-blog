<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>阴湿青春 BINGO</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:"DM Sans","PingFang SC",-apple-system,sans-serif;
  background:#f8f6f2; color:#1c1917; min-height:100vh;
}
.container { max-width:600px; margin:0 auto; padding:16px 12px 40px; }

.header {
  display:flex; margin-bottom:16px; background:#fff;
  border-radius:14px; box-shadow:0 2px 12px rgba(0,0,0,.06); overflow:hidden;
}
.header-title {
  flex:3; display:flex; align-items:center; justify-content:center;
  padding:16px; font-size:1.3em; font-weight:700; text-align:center;
}
.header-desc {
  flex:2; display:flex; align-items:center; justify-content:center;
  padding:12px; font-size:0.78em; color:#a8a29e; line-height:1.6;
  border-left:1px solid #e7e5e4; text-align:center;
}

.board {
  display:grid; grid-template-columns:repeat(5,1fr); gap:6px;
  background:#fff; border-radius:14px; padding:10px; box-shadow:0 2px 12px rgba(0,0,0,.06);
}
.cell {
  aspect-ratio:1; display:flex; align-items:center; justify-content:center;
  text-align:center; font-size:0.7em; line-height:1.3; padding:5px 3px;
  border:2px solid #e7e5e4; border-radius:10px; cursor:pointer;
  transition:all .2s; user-select:none; word-break:break-word; overflow:hidden;
}
.cell:hover { border-color:#8e44ad; }
.cell.marked { background:#8e44ad; color:#fff; border-color:#8e44ad; }
.cell.bingo-line {
  background:#e74c3c; color:#fff; border-color:#e74c3c;
  animation:pulse .5s cubic-bezier(0.16,1,0.3,1) infinite alternate;
}
@keyframes pulse { from{transform:scale(1)} to{transform:scale(1.04)} }

.status {
  text-align:center; margin:14px 0; padding:12px;
  background:#fff; border-radius:14px; box-shadow:0 2px 12px rgba(0,0,0,.06);
  font-size:0.9em; min-height:44px; display:flex; align-items:center; justify-content:center;
}
.btn-group { display:flex; gap:8px; justify-content:center; margin-top:12px; }
.btn {
  padding:8px 20px; border:none; border-radius:999px; cursor:pointer; font-size:0.85em; transition:all .2s;
}
.btn-primary { background:#8e44ad; color:#fff; }
.btn-primary:hover { background:#732d91; }
.btn-secondary { background:#fff; border:1px solid #ddd; color:#555; }
.btn-secondary:hover { border-color:#8e44ad; color:#8e44ad; }
.btn-share { background:#1da1f2; color:#fff; }
.btn-share:hover { background:#1a91da; }

.modal-overlay {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,.5); z-index:999; align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.active { display:flex; }
.modal-box {
  background:#fff; border-radius:16px; padding:24px; max-width:460px; width:100%;
  text-align:center; box-shadow:0 8px 32px rgba(0,0,0,.15);
}
.modal-box img { width:100%; border-radius:8px; margin:12px 0; }
.modal-box h3 { margin-bottom:8px; }
.modal-box .modal-btns { display:flex; gap:8px; justify-content:center; margin-top:12px; }

@media (max-width:480px) {
  .header { flex-direction:column; }
  .header-desc { border-left:none; border-top:1px solid #e7e5e4; }
  .cell { font-size:0.62em; padding:3px 2px; }
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-title">阴湿青春 BINGO</div>
    <div class="header-desc">五个连成一线，<br>说明你度过了一个阴湿的青春，<br>活到现在真是辛苦了！</div>
  </div>

  <div class="board" id="board"></div>
  <div class="status" id="status">点击格子标记，连成线即 Bingo！</div>

  <div class="btn-group">
    <button class="btn btn-secondary" id="resetBtn">🔄 重新开局</button>
    <button class="btn btn-share" id="shareBtn">📤 分享结果</button>
  </div>

</div>

<div class="modal-overlay" id="shareModal">
  <div class="modal-box">
    <h3>📤 分享你的宾果</h3>
    <div id="shareImageArea"></div>
    <p id="shareText" style="font-size:0.85em;color:#a8a29e;"></p>
    <div class="modal-btns">
      <button class="btn btn-secondary" id="closeModalBtn">关闭</button>
      <a id="downloadBtn" class="btn btn-primary" download="bingo.png">💾 保存图片</a>
    </div>
  </div>
</div>

<script>
(function(){
  var CELLS = [
    "有过喜欢的人但没被对方喜欢","没和喜欢的人一起吃东西过","喜欢的人最后和别人在一起了","从没在任何一个情人节收到过任何礼物","丢脸的丢掉初吻，和无感甚至反感的家伙",
    "从来都是一个人吃饭","暴饮暴食或者食欲不振","歌力普通或者不怎么好听","曾出于自己主观意愿过量用药","一个人逛展并在这期间没敢进行任何社交",
    "成绩中游或者更不好看","没参加过学校组织的表演活动","听术力口","在校期间没被人称赞过外貌","高强度穿校服",
    "曾试图以某种方式对某人/某群人/整个世界进行诅咒","有一个对你不好/你很讨厌的姐姐/妹妹/哥哥/弟弟","以任意方式自残过","家庭关系不和，父母是垃圾","没有拿得出手的特长",
    "各种深色系换着穿，发型很凌乱或者很土","不敢争取自己应得之物","遭遇过校园霸凌","穷，或者说没有/不敢自由支配财产","体脂过高或过低"
  ];

  var marked = {};
  var bingo = false;

  function render() {
    var html = '';
    for (var i = 0; i < 25; i++) {
      var cls = 'cell';
      if (marked[i]) cls += ' marked';
      if (bingo && isBingoCell(i)) cls += ' bingo-line';
      html += '<div class="' + cls + '" data-i="' + i + '">' + CELLS[i] + '</div>';
    }
    document.getElementById('board').innerHTML = html;

    document.querySelectorAll('.cell').forEach(function(el){
      el.addEventListener('click', function(){
        var i = parseInt(this.dataset.i);
        marked[i] = !marked[i];
        checkBingo();
        render();
      });
    });

    updateStatus();
  }

  function updateStatus() {
    var count = 0;
    for (var k in marked) { if (marked[k]) count++; }
    var el = document.getElementById('status');
    if (bingo) {
      el.innerHTML = '🎉 <strong>BINGO！</strong> 你度过了一个阴湿的青春，活到现在真是辛苦了 🫂';
    } else {
      el.innerHTML = '已标记 <strong>' + count + '</strong> 项 — 点击格子标记，连成线即 Bingo！';
    }
  }

  function checkBingo() {
    bingo = false;
    for (var r = 0; r < 5; r++) {
      var win = true; for (var c = 0; c < 5; c++) { if (!marked[r*5+c]) { win = false; break; } }
      if (win) { bingo = true; return; }
    }
    for (var c = 0; c < 5; c++) {
      var win = true; for (var r = 0; r < 5; r++) { if (!marked[r*5+c]) { win = false; break; } }
      if (win) { bingo = true; return; }
    }
    var win = true; for (var i = 0; i < 5; i++) { if (!marked[i*5+i]) { win = false; break; } }
    if (win) { bingo = true; return; }
    win = true; for (var i = 0; i < 5; i++) { if (!marked[i*5+(4-i)]) { win = false; break; } }
    if (win) { bingo = true; return; }
  }

  function isBingoCell(idx) {
    if (!bingo) return false;
    var r = Math.floor(idx/5), c = idx%5;
    var rw = true; for (var cc=0;cc<5;cc++) { if (!marked[r*5+cc]) { rw=false; break; } } if (rw) return true;
    var cw = true; for (var rr=0;rr<5;rr++) { if (!marked[rr*5+c]) { cw=false; break; } } if (cw) return true;
    if (r===c) { var dw=true; for(var i=0;i<5;i++){if(!marked[i*5+i]){dw=false;break;}} if(dw) return true; }
    if (r+c===4) { var dw=true; for(var i=0;i<5;i++){if(!marked[i*5+(4-i)]){dw=false;break;}} if(dw) return true; }
    return false;
  }

  // 生成分享图片
  function generateShareImage() {
    var size = 800, cellSize = 130, padding = 50, headerH = 100, gap = 6;
    var boardSize = cellSize * 5 + gap * 4;
    var totalW = size, totalH = padding + headerH + 20 + boardSize + padding + 40;
    var canvas = document.createElement('canvas');
    canvas.width = totalW; canvas.height = totalH;
    var ctx = canvas.getContext('2d');

    ctx.fillStyle = '#f5f7fa'; ctx.fillRect(0, 0, totalW, totalH);
    ctx.fillStyle = '#2c3e50';
    ctx.font = 'bold 28px -apple-system,PingFang SC,Microsoft YaHei,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText('阴湿青春 BINGO', totalW/2, padding);
    ctx.fillStyle = '#7f8c9b';
    ctx.font = '16px -apple-system,PingFang SC,Microsoft YaHei,sans-serif';
    ctx.fillText('五个连成一线，说明你度过了一个阴湿的青春，活到现在真是辛苦了', totalW/2, padding + 40);

    var bx = (totalW - boardSize) / 2, by = padding + headerH;

    var labels = ['B','I','N','G','O'];
    ctx.fillStyle = '#8e44ad';
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    for (var i = 0; i < 5; i++) {
      ctx.fillText(labels[i], bx + cellSize/2 + i*(cellSize+gap), by - 2);
    }

    for (var i = 0; i < 25; i++) {
      var row = Math.floor(i / 5), col = i % 5;
      var x = bx + col * (cellSize + gap), y = by + 22 + row * (cellSize + gap);
      var isMarked = marked[i], isWin = bingo && isBingoCell(i);

      ctx.fillStyle = isWin ? '#e74c3c' : (isMarked ? '#8e44ad' : '#fff');
      roundRect(ctx, x, y, cellSize, cellSize, 8);
      ctx.fill();
      ctx.strokeStyle = isWin || isMarked ? 'transparent' : '#e7e5e4';
      ctx.lineWidth = 2;
      roundRect(ctx, x, y, cellSize, cellSize, 8);
      ctx.stroke();

      ctx.fillStyle = isWin || isMarked ? '#fff' : '#2c3e50';
      ctx.font = '12px -apple-system,PingFang SC,Microsoft YaHei,sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

      var text = CELLS[i];
      var maxW = cellSize - 14;
      var lines = [], current = '';
      for (var c = 0; c < text.length; c++) {
        var test = current + text[c];
        if (ctx.measureText(test).width > maxW && current.length > 0) {
          lines.push(current); current = text[c];
        } else { current = test; }
      }
      if (current) lines.push(current);
      var lineH = 16;
      var startY = y + cellSize/2 - (lines.length-1) * lineH/2;
      for (var l = 0; l < lines.length; l++) {
        ctx.fillText(lines[l], x + cellSize/2, startY + l * lineH);
      }
    }

    ctx.fillStyle = '#aaa';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('1nuo.me', totalW/2, totalH - 16);
    return canvas.toDataURL('image/png');
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  document.getElementById('shareBtn').addEventListener('click', function(){
    track('bingo2');
    var dataUrl = generateShareImage();
    var count = 0; for (var k in marked) { if (marked[k]) count++; }
    document.getElementById('shareImageArea').innerHTML = '<img src="' + dataUrl + '" alt="宾果结果">';
    document.getElementById('shareText').textContent = '已标记 ' + count + '/25 项';
    document.getElementById('downloadBtn').href = dataUrl;
    document.getElementById('shareModal').classList.add('active');
  });

  document.getElementById('closeModalBtn').addEventListener('click', function(){
    document.getElementById('shareModal').classList.remove('active');
  });
  document.getElementById('shareModal').addEventListener('click', function(e){
    if (e.target === this) this.classList.remove('active');
  });

  document.getElementById('resetBtn').addEventListener('click', function(){
    marked = {}; bingo = false; render();
  });

  render();
})();
function track(a){fetch('/api/stats',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:a})}).catch(function(){})}
</script>
<div style="text-align:center;margin-top:20px;padding:8px;font-size:0.75em;color:#aaa;border-top:1px solid #e7e5e4;">📝 制表人：诺诺</div></body>
</html>
